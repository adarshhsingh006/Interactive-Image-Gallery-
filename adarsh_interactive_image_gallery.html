<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARVEL — Hero Codex</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8002d;
    --red-dark: #a30020;
    --gold: #f7c948;
    --ink: #0a0a0a;
    --ink2: #111214;
    --panel: #161618;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: #6b6b6b;
    --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
    --ease-out: cubic-bezier(0.22,1,0.36,1);
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  html { scroll-behavior: smooth; }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
    user-select: none;
  }

  /* ── Animated scan lines bg ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
    pointer-events: none; z-index: 0;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    height: 56px;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 2rem; gap: 1.5rem;
  }

  .marvel-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.12em;
    color: #fff;
    background: var(--red);
    padding: 2px 10px 0;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .topbar-title {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.22em;
    font-size: 1rem;
    color: var(--muted);
    flex: 1;
  }

  .search-wrap {
    position: relative;
    flex-shrink: 0;
  }

  #searchInput {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    padding: 0.35rem 1rem 0.35rem 2.2rem;
    width: 200px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  #searchInput::placeholder { color: var(--muted); }
  #searchInput:focus { border-color: var(--red); background: rgba(232,0,45,0.07); }

  .search-icon {
    position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%);
    font-size: 0.85rem; color: var(--muted); pointer-events: none;
  }

  .view-toggle {
    display: flex; gap: 4px;
  }

  .view-btn {
    width: 32px; height: 32px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; transition: all 0.2s;
  }

  .view-btn.active, .view-btn:hover { border-color: var(--red); color: var(--red); background: rgba(232,0,45,0.1); }

  /* ── SIDEBAR ── */
  #sidebar {
    position: fixed; left: 0; top: 56px; bottom: 0;
    width: 220px; z-index: 100;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    display: flex; flex-direction: column; gap: 0.2rem;
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--muted); padding: 0.7rem 1.2rem 0.3rem;
  }

  .filter-btn {
    display: flex; align-items: center; gap: 0.7rem;
    padding: 0.55rem 1.2rem;
    background: transparent; border: none; cursor: pointer;
    color: rgba(255,255,255,0.55); font-family: 'Inter', sans-serif;
    font-size: 0.82rem; width: 100%; text-align: left;
    border-left: 2px solid transparent;
    transition: all 0.2s;
  }

  .filter-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }

  .filter-btn.active {
    color: var(--text);
    border-left-color: var(--red);
    background: rgba(232,0,45,0.08);
  }

  .filter-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .filter-count {
    margin-left: auto;
    font-size: 0.68rem; color: var(--muted);
    background: rgba(255,255,255,0.06);
    padding: 1px 6px; border-radius: 100px;
  }

  /* ── MAIN ── */
  #main {
    margin-left: 220px;
    padding-top: 56px;
  }

  /* ── HERO BANNER ── */
  #banner {
    height: 220px;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0005 50%, #0a0a0a 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 2.5rem;
    position: relative; overflow: hidden;
  }

  #banner::before {
    content: 'HERO CODEX';
    position: absolute; right: -20px; top: 50%;
    transform: translateY(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14rem; line-height: 1;
    color: rgba(232,0,45,0.04);
    pointer-events: none; letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .banner-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    letter-spacing: 0.15em; line-height: 0.9;
    color: #fff;
  }

  .banner-text h1 em {
    color: var(--red); font-style: normal;
  }

  .banner-text p {
    font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin-top: 0.7rem;
  }

  .banner-stats {
    margin-left: auto; display: flex; gap: 2rem;
    position: relative; z-index: 1;
  }

  .bstat {
    text-align: center;
  }

  .bstat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem; color: var(--red); line-height: 1;
    letter-spacing: 0.05em;
  }

  .bstat-label {
    font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); margin-top: 0.2rem;
  }

  /* ── SORT BAR ── */
  #sortbar {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.9rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(12,12,12,0.8);
  }

  .sort-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; }

  .sort-btn {
    font-size: 0.72rem; letter-spacing: 0.08em;
    background: transparent; border: 1px solid var(--border);
    border-radius: 4px; color: var(--muted);
    padding: 0.25rem 0.7rem; cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }

  .sort-btn:hover, .sort-btn.active { border-color: var(--red); color: var(--red); background: rgba(232,0,45,0.08); }

  #resultCount {
    margin-left: auto; font-size: 0.72rem; color: var(--muted);
  }

  /* ── GRID ── */
  #gallery {
    padding: 1.5rem 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    transition: all 0.3s;
  }

  #gallery.list-view {
    grid-template-columns: 1fr;
    gap: 0.5rem;
  }

  /* ── CARD ── */
  .card {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    background: var(--panel);
    border: 1px solid var(--border);
    opacity: 0;
    transform: translateY(20px) scale(0.97);
    transition:
      opacity 0.4s var(--ease-out),
      transform 0.4s var(--ease-out),
      box-shadow 0.3s,
      border-color 0.3s;
  }

  .card.in { opacity: 1; transform: translateY(0) scale(1); }
  .card.hidden { display: none; }

  .card:hover {
    border-color: rgba(232,0,45,0.5);
    box-shadow: 0 0 0 1px rgba(232,0,45,0.25), 0 20px 60px rgba(0,0,0,0.7);
    z-index: 2;
  }

  /* draggable state */
  .card.dragging {
    opacity: 0.55; transform: scale(0.95); cursor: grabbing;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8);
    z-index: 999;
  }

  .card.drag-over { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold); }

  /* image */
  .card-img {
    width: 100%; aspect-ratio: 2/3;
    object-fit: cover; object-position: top center;
    display: block;
    transition: transform 0.5s var(--ease-out), filter 0.4s;
    filter: saturate(0.9) brightness(0.9);
  }

  .card:hover .card-img {
    transform: scale(1.06);
    filter: saturate(1.1) brightness(1.05);
  }

  /* team badge */
  .team-badge {
    position: absolute; top: 0.6rem; left: 0.6rem;
    font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 3px;
    font-weight: 600;
  }

  /* power level bar */
  .power-bar-wrap {
    position: absolute; top: 0.6rem; right: 0.6rem;
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  }

  .power-label {
    font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  .power-bar {
    width: 40px; height: 4px; background: rgba(0,0,0,0.5);
    border-radius: 2px; overflow: hidden;
  }

  .power-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.8s var(--ease-out);
  }

  /* bottom overlay */
  .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 45%, transparent 100%);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 1rem 0.9rem 0.9rem;
  }

  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem; letter-spacing: 0.1em;
    color: #fff; line-height: 1.1; margin-bottom: 0.15rem;
    transform: translateY(4px);
    transition: transform 0.3s var(--ease-spring);
  }

  .card:hover .card-name { transform: translateY(0); }

  .card-alias {
    font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    transform: translateY(4px);
    transition: transform 0.3s var(--ease-spring) 0.04s;
  }

  .card:hover .card-alias { transform: translateY(0); }

  .card-abilities {
    display: flex; gap: 4px; flex-wrap: wrap; margin-top: 0.4rem;
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s var(--ease-spring) 0.06s;
  }

  .card:hover .card-abilities { opacity: 1; transform: translateY(0); }

  .ability-tag {
    font-size: 0.55rem; letter-spacing: 0.1em;
    padding: 2px 6px; border-radius: 3px;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
  }

  /* favourite star */
  .fav-btn {
    position: absolute; bottom: 0.75rem; right: 0.8rem;
    background: transparent; border: none; cursor: pointer;
    font-size: 1rem; color: rgba(255,255,255,0.2);
    transition: color 0.25s, transform 0.3s var(--ease-spring);
    z-index: 5;
    line-height: 1;
  }

  .fav-btn:hover { transform: scale(1.3); }
  .fav-btn.faved { color: var(--gold); }

  /* LIST VIEW card */
  #gallery.list-view .card {
    display: flex; align-items: center; gap: 1rem;
    height: 80px; border-radius: 6px;
  }

  #gallery.list-view .card-img { width: 60px; height: 80px; aspect-ratio: unset; flex-shrink: 0; }
  #gallery.list-view .card-overlay { position: static; background: none; padding: 0; flex: 1; flex-direction: row; align-items: center; gap: 1rem; }
  #gallery.list-view .card-name { font-size: 1rem; transform: none; }
  #gallery.list-view .card-alias { transform: none; }
  #gallery.list-view .card:hover .card-name, #gallery.list-view .card:hover .card-alias { transform: none; }
  #gallery.list-view .card-abilities { opacity: 1; transform: none; margin: 0; margin-left: auto; }
  #gallery.list-view .team-badge, #gallery.list-view .power-bar-wrap { display: none; }
  #gallery.list-view .fav-btn { position: static; margin-left: 1rem; }

  /* ── LIGHTBOX ── */
  #lightbox {
    position: fixed; inset: 0; z-index: 500;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }

  #lightbox.open { opacity: 1; pointer-events: all; }

  .lb-bg {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(24px) saturate(0.3);
    cursor: zoom-out;
  }

  .lb-panel {
    position: relative; z-index: 1;
    display: flex; gap: 0; border-radius: 12px; overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    width: min(900px, 92vw);
    transform: scale(0.92) translateY(20px);
    transition: transform 0.4s var(--ease-spring);
    max-height: 90vh;
  }

  #lightbox.open .lb-panel { transform: scale(1) translateY(0); }

  .lb-img-side {
    width: 340px; flex-shrink: 0; position: relative; overflow: hidden;
  }

  .lb-img-side img {
    width: 100%; height: 100%; object-fit: cover; object-position: top center;
    display: block;
  }

  .lb-img-side::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to right, transparent 60%, rgba(0,0,0,0.6) 100%);
  }

  .lb-info-side {
    flex: 1; background: #111;
    padding: 2rem; display: flex; flex-direction: column;
    gap: 1.2rem; overflow-y: auto;
  }

  .lb-header { display: flex; justify-content: space-between; align-items: flex-start; }

  .lb-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem; letter-spacing: 0.08em; color: #fff; line-height: 1;
  }

  .lb-alias {
    font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); margin-top: 0.25rem;
  }

  #lbClose {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer; color: var(--muted); font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }

  #lbClose:hover { background: rgba(232,0,45,0.2); color: #fff; border-color: var(--red); }

  .lb-quote {
    font-size: 0.9rem; color: rgba(255,255,255,0.6);
    border-left: 2px solid var(--red); padding-left: 0.9rem;
    font-style: italic; line-height: 1.6;
  }

  .lb-stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem;
  }

  .lb-stat {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.7rem;
  }

  .lb-stat-label {
    font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.25rem;
  }

  .lb-stat-val {
    font-size: 0.9rem; font-weight: 500; color: var(--text);
  }

  .lb-power-section {}

  .lb-power-title {
    font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.6rem;
  }

  .lb-power-row {
    display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.45rem;
  }

  .lb-power-name { font-size: 0.75rem; width: 90px; color: rgba(255,255,255,0.6); flex-shrink: 0; }

  .lb-power-track {
    flex: 1; height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden;
  }

  .lb-power-fill {
    height: 100%; border-radius: 3px; background: var(--red);
    width: 0; transition: width 0.9s var(--ease-out);
  }

  .lb-power-num { font-size: 0.7rem; color: var(--muted); width: 24px; text-align: right; flex-shrink: 0; }

  .lb-abilities-list {
    display: flex; flex-wrap: wrap; gap: 6px;
  }

  .lb-ability {
    font-size: 0.68rem; padding: 4px 10px; border-radius: 4px;
    background: rgba(232,0,45,0.12); border: 1px solid rgba(232,0,45,0.25);
    color: rgba(255,150,150,0.9); letter-spacing: 0.06em;
  }

  /* nav arrows */
  .lb-nav {
    position: absolute; top: 50%; z-index: 2;
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer; color: #fff; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; transform: translateY(-50%);
  }

  .lb-nav:hover { background: var(--red); border-color: var(--red); }
  #lbPrev { right: calc(100% + 12px); }
  #lbNext { left: calc(100% + 12px); }

  /* ── DRAG GHOST ── */
  #dragGhost {
    position: fixed; pointer-events: none; z-index: 9999;
    background: rgba(10,10,10,0.85); border: 1px solid var(--gold);
    border-radius: 8px; padding: 0.5rem;
    font-family: 'Bebas Neue', sans-serif;
    color: var(--gold); font-size: 1rem; letter-spacing: 0.1em;
    display: none; white-space: nowrap;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 9000;
    background: #1c1c1c; border: 1px solid var(--border);
    border-radius: 8px; padding: 0.7rem 1.2rem;
    font-size: 0.8rem; color: var(--text);
    display: flex; align-items: center; gap: 0.6rem;
    transform: translateY(20px); opacity: 0;
    transition: all 0.3s var(--ease-spring);
    pointer-events: none; max-width: 300px;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  .toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; }

  /* ── EMPTY STATE ── */
  #empty {
    display: none; text-align: center; padding: 5rem 2rem; color: var(--muted);
  }

  #empty.show { display: block; }
  #empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.2; }
  #empty h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.2); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--red); }

  @media (max-width: 768px) {
    #sidebar { display: none; }
    #main { margin-left: 0; }
    .lb-img-side { display: none; }
    #lbPrev, #lbNext { display: none; }
    #gallery { padding: 1rem; gap: 0.75rem; }
    #gallery { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<nav id="topbar">
  <div class="marvel-logo">MARVEL</div>
  <div class="topbar-title">Hero Codex — Interactive Gallery</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search heroes…">
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="gridViewBtn" title="Grid view">⊞</button>
    <button class="view-btn" id="listViewBtn" title="List view">☰</button>
  </div>
</nav>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="sidebar-label">Universe</div>
  <button class="filter-btn active" data-filter="all">
    <span class="filter-dot" style="background:#666"></span>
    All Heroes
    <span class="filter-count" id="fc-all">10</span>
  </button>
  <button class="filter-btn" data-filter="avengers">
    <span class="filter-dot" style="background:#e8002d"></span>
    Avengers
    <span class="filter-count" id="fc-avengers">4</span>
  </button>
  <button class="filter-btn" data-filter="guardians">
    <span class="filter-dot" style="background:#6a3de8"></span>
    Guardians
    <span class="filter-count" id="fc-guardians">2</span>
  </button>
  <button class="filter-btn" data-filter="xmen">
    <span class="filter-dot" style="background:#1a90d9"></span>
    X-Men
    <span class="filter-count" id="fc-xmen">2</span>
  </button>
  <button class="filter-btn" data-filter="spider">
    <span class="filter-dot" style="background:#e84020"></span>
    Spider-Verse
    <span class="filter-count" id="fc-spider">1</span>
  </button>
  <button class="filter-btn" data-filter="favourites">
    <span class="filter-dot" style="background:#f7c948"></span>
    ★ Favourites
    <span class="filter-count" id="fc-favourites">0</span>
  </button>

  <div class="sidebar-label" style="margin-top:1rem">Sort By</div>
  <button class="filter-btn sort-side" data-sort="name">
    <span style="font-size:0.8rem">A→Z</span> Name
  </button>
  <button class="filter-btn sort-side active" data-sort="power">
    <span style="font-size:0.8rem">⚡</span> Power Level
  </button>
</aside>

<!-- Main Content -->
<div id="main">
  <!-- Banner -->
  <div id="banner">
    <div class="banner-text">
      <h1>HERO<br><em>CODEX</em></h1>
      <p>Interactive Marvel Universe Gallery</p>
    </div>
    <div class="banner-stats">
      <div class="bstat"><div class="bstat-num" id="statTotal">10</div><div class="bstat-label">Heroes</div></div>
      <div class="bstat"><div class="bstat-num" id="statFav">0</div><div class="bstat-label">Favourites</div></div>
      <div class="bstat"><div class="bstat-num" id="statShowing">10</div><div class="bstat-label">Showing</div></div>
    </div>
  </div>

  <!-- Sort bar -->
  <div id="sortbar">
    <span class="sort-label">SORT:</span>
    <button class="sort-btn" data-sort="name">A → Z</button>
    <button class="sort-btn active" data-sort="power">Power ↓</button>
    <button class="sort-btn" data-sort="team">Team</button>
    <span style="margin-left:0.5rem;font-size:0.7rem;color:var(--muted)">Drag cards to reorder</span>
    <span id="resultCount" style="font-size:0.72rem;color:var(--muted)"></span>
  </div>

  <!-- Gallery -->
  <div id="gallery"></div>
  <div id="empty"><div id="empty-icon">🔍</div><h3>No heroes found</h3></div>
</div>

<!-- Drag ghost -->
<div id="dragGhost"></div>

<!-- Toast -->
<div id="toast"><div class="toast-dot"></div><span id="toastMsg"></span></div>

<!-- Lightbox -->
<div id="lightbox">
  <div class="lb-bg" id="lbBg"></div>
  <button class="lb-nav" id="lbPrev">&#8592;</button>
  <div class="lb-panel">
    <div class="lb-img-side"><img id="lbImg" src="" alt=""></div>
    <div class="lb-info-side">
      <div class="lb-header">
        <div>
          <div class="lb-name" id="lbName"></div>
          <div class="lb-alias" id="lbAlias"></div>
        </div>
        <button id="lbClose">✕</button>
      </div>
      <div class="lb-quote" id="lbQuote"></div>
      <div class="lb-stats-grid" id="lbStatsGrid"></div>
      <div class="lb-power-section">
        <div class="lb-power-title">Power Stats</div>
        <div id="lbPowerRows"></div>
      </div>
      <div>
        <div class="lb-power-title">Abilities</div>
        <div class="lb-abilities-list" id="lbAbilities"></div>
      </div>
    </div>
  </div>
  <button class="lb-nav" id="lbNext">&#8594;</button>
</div>

<script>

  {

  {

    img:"https://i.annihil.us/u/prod/marvel/i/mg/5/f0/5261b8e4c5f35/portrait_uncanny.jpg",
    teamColor:"#e8002d", teamLabel:"Avengers",
    quote:"Dormammu, I've come to bargain.",
    power:97, abilities:["Sorcery","Time Manipulation","Astral Projection","Dimension Travel","Cloak of Levitation"],
    stats:{Height:"6'2\"",Weight:"180 lbs",Eyes:"Grey",Affiliation:"Avengers / Sorcerers"},
    powers:{Intelligence:90,Strength:14,Speed:58,Durability:84,Energy:100,Fighting:84}
  }
];

let currentFilter = 'all';
let currentSort = 'power';
let searchQuery = '';
let favourites = new Set();
let currentView = 'grid';
let currentLbIndex = 0;
let dragSrcIndex = null;
let heroOrder = HEROES.map((_,i) => i);

const gallery = document.getElementById('gallery');
const lightbox = document.getElementById('lightbox');
const toast = document.getElementById('toast');
let toastTimer;

function showToast(msg) {
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
}

function getFilteredSorted() {
  let arr = heroOrder.map(i => HEROES[i]);
  if (currentFilter === 'favourites') arr = arr.filter(h => favourites.has(h.id));
  else if (currentFilter !== 'all') arr = arr.filter(h => h.team === currentFilter);
  if (searchQuery) arr = arr.filter(h =>
    h.name.toLowerCase().includes(searchQuery) ||
    h.alias.toLowerCase().includes(searchQuery) ||
    h.abilities.some(a => a.toLowerCase().includes(searchQuery))
  );
  if (currentSort === 'power') arr = [...arr].sort((a,b) => b.power - a.power);
  else if (currentSort === 'name') arr = [...arr].sort((a,b) => a.name.localeCompare(b.name));
  else if (currentSort === 'team') arr = [...arr].sort((a,b) => a.team.localeCompare(b.team));
  return arr;
}

function buildCard(hero, displayIndex) {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.id = hero.id;
  div.draggable = true;
  const isFaved = favourites.has(hero.id);
  const pwColor = hero.power >= 90 ? '#f7c948' : hero.power >= 75 ? '#e8002d' : '#888';
  div.innerHTML = `
    <img class="card-img" src="${hero.img}" alt="${hero.name}" loading="lazy">
    <span class="team-badge" style="background:${hero.teamColor}22;color:${hero.teamColor};border:1px solid ${hero.teamColor}55">${hero.teamLabel}</span>
    <div class="power-bar-wrap">
      <span class="power-label">PWR</span>
      <div class="power-bar"><div class="power-fill" style="width:${hero.power}%;background:${pwColor}"></div></div>
    </div>
    <div class="card-overlay">
      <div class="card-name">${hero.name}</div>
      <div class="card-alias">${hero.alias}</div>
      <div class="card-abilities">
        ${hero.abilities.slice(0,3).map(a=>`<span class="ability-tag">${a}</span>`).join('')}
      </div>
    </div>
    <button class="fav-btn ${isFaved?'faved':''}" title="${isFaved?'Remove favourite':'Add favourite'}">★</button>
  `;

  div.addEventListener('click', e => {
    if (e.target.classList.contains('fav-btn')) return;
    const filtered = getFilteredSorted();
    currentLbIndex = filtered.findIndex(h => h.id === hero.id);
    openLightbox(hero);
  });

  div.querySelector('.fav-btn').addEventListener('click', e => {
    e.stopPropagation();
    toggleFav(hero.id, div.querySelector('.fav-btn'));
  });

  // Drag
  div.addEventListener('dragstart', e => {
    dragSrcIndex = heroOrder.indexOf(HEROES.findIndex(h => h.id === hero.id));
    div.classList.add('dragging');
    const ghost = document.getElementById('dragGhost');
    ghost.textContent = hero.name;
    ghost.style.display = 'block';
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setDragImage(ghost, 0, 0);
    setTimeout(() => ghost.style.display = 'none', 0);
  });

  div.addEventListener('dragend', () => {
    div.classList.remove('dragging');
    document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
  });

  div.addEventListener('dragover', e => {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    div.classList.add('drag-over');
  });

  div.addEventListener('dragleave', () => div.classList.remove('drag-over'));

  div.addEventListener('drop', e => {
    e.preventDefault();
    div.classList.remove('drag-over');
    const targetGlobalIndex = HEROES.findIndex(h => h.id === hero.id);
    const targetOrderIndex = heroOrder.indexOf(targetGlobalIndex);
    if (dragSrcIndex !== null && dragSrcIndex !== targetOrderIndex) {
      const [moved] = heroOrder.splice(dragSrcIndex, 1);
      heroOrder.splice(targetOrderIndex, 0, moved);
      renderGallery();
      showToast('Order updated');
    }
    dragSrcIndex = null;
  });

  // Stagger in
  setTimeout(() => requestAnimationFrame(() => div.classList.add('in')), displayIndex * 65);
  return div;
}

function renderGallery() {
  gallery.innerHTML = '';
  const filtered = getFilteredSorted();
  const empty = document.getElementById('empty');
  if (filtered.length === 0) { empty.classList.add('show'); } else { empty.classList.remove('show'); }
  filtered.forEach((hero, i) => gallery.appendChild(buildCard(hero, i)));
  updateCounters(filtered.length);
}

function updateCounters(showing) {
  document.getElementById('statTotal').textContent = HEROES.length;
  document.getElementById('statFav').textContent = favourites.size;
  document.getElementById('statShowing').textContent = showing;
  document.getElementById('resultCount').textContent = `${showing} hero${showing!==1?'es':''} shown`;
  const counts = {};
  HEROES.forEach(h => { counts[h.team] = (counts[h.team]||0) + 1; });
  const fKeys = ['avengers','guardians','xmen','spider'];
  fKeys.forEach(k => {
    const el = document.getElementById('fc-'+k);
    if (el) el.textContent = counts[k]||0;
  });
  document.getElementById('fc-all').textContent = HEROES.length;
  document.getElementById('fc-favourites').textContent = favourites.size;
}

function toggleFav(id, btn) {
  if (favourites.has(id)) {
    favourites.delete(id);
    btn.classList.remove('faved');
    const h = HEROES.find(x => x.id === id);
    showToast(`${h.name} removed from favourites`);
  } else {
    favourites.add(id);
    btn.classList.add('faved');
    const h = HEROES.find(x => x.id === id);
    showToast(`★ ${h.name} added to favourites`);
  }
  updateCounters(getFilteredSorted().length);
  if (currentFilter === 'favourites') renderGallery();
}

// ── Lightbox ──────────────────────────────
function openLightbox(hero) {
  document.getElementById('lbImg').src = hero.img;
  document.getElementById('lbName').textContent = hero.name;
  document.getElementById('lbAlias').textContent = hero.alias;
  document.getElementById('lbQuote').textContent = `"${hero.quote}"`;

  const grid = document.getElementById('lbStatsGrid');
  grid.innerHTML = Object.entries(hero.stats).map(([k,v]) => `
    <div class="lb-stat">
      <div class="lb-stat-label">${k}</div>
      <div class="lb-stat-val">${v}</div>
    </div>
  `).join('');

  const pwRows = document.getElementById('lbPowerRows');
  pwRows.innerHTML = '';
  Object.entries(hero.powers).forEach(([k,v]) => {
    const row = document.createElement('div');
    row.className = 'lb-power-row';
    row.innerHTML = `
      <span class="lb-power-name">${k}</span>
      <div class="lb-power-track"><div class="lb-power-fill" data-val="${v}"></div></div>
      <span class="lb-power-num">${v}</span>
    `;
    pwRows.appendChild(row);
  });

  document.getElementById('lbAbilities').innerHTML =
    hero.abilities.map(a => `<span class="lb-ability">${a}</span>`).join('');

  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Animate power bars
  setTimeout(() => {
    document.querySelectorAll('.lb-power-fill').forEach(el => {
      el.style.width = el.dataset.val + '%';
    });
  }, 50);
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => {
    document.querySelectorAll('.lb-power-fill').forEach(el => el.style.width = '0');
  }, 300);
}

function lbNavigate(dir) {
  const filtered = getFilteredSorted();
  currentLbIndex = (currentLbIndex + dir + filtered.length) % filtered.length;
  // flash
  const img = document.getElementById('lbImg');
  img.style.transition = 'opacity 0.15s';
  img.style.opacity = '0';
  setTimeout(() => {
    openLightbox(filtered[currentLbIndex]);
    img.style.opacity = '1';
  }, 150);
}

document.getElementById('lbBg').addEventListener('click', closeLightbox);
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => lbNavigate(-1));
document.getElementById('lbNext').addEventListener('click', () => lbNavigate(1));

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') lbNavigate(1);
  if (e.key === 'ArrowLeft') lbNavigate(-1);
});

// Touch swipe on lightbox
let tsX = 0;
lightbox.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; }, {passive:true});
lightbox.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tsX;
  if (Math.abs(dx) > 50) lbNavigate(dx < 0 ? 1 : -1);
});

// ── Filters + Sort ─────────────────────────
document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGallery();
  });
});

document.querySelectorAll('.sort-btn, .sort-side').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn,.sort-side').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderGallery();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderGallery();
});

document.getElementById('gridViewBtn').addEventListener('click', () => {
  currentView = 'grid';
  gallery.classList.remove('list-view');
  document.getElementById('gridViewBtn').classList.add('active');
  document.getElementById('listViewBtn').classList.remove('active');
});

document.getElementById('listViewBtn').addEventListener('click', () => {
  currentView = 'list';
  gallery.classList.add('list-view');
  document.getElementById('listViewBtn').classList.add('active');
  document.getElementById('gridViewBtn').classList.remove('active');
});

// ── Init ───────────────────────────────────
renderGallery();
</script>
